<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0d1419"/>
      <stop offset="60%" stop-color="#070b10"/>
      <stop offset="100%" stop-color="#04070a"/>
    </radialGradient>
    <radialGradient id="aurora1" cx="22%" cy="32%" r="40%">
      <stop offset="0%" stop-color="#33e8b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#33e8b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="82%" cy="68%" r="42%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#33e8b0" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#33e8b0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#33e8b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33e8b0"/>
      <stop offset="100%" stop-color="#5fffc8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#aurora1)"/>
  <rect width="1200" height="630" fill="url(#aurora2)"/>

  <!-- central orb glow -->
  <circle cx="600" cy="300" r="280" fill="url(#orb)"/>
  <circle cx="600" cy="300" r="160" fill="none" stroke="#33e8b0" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="600" cy="300" r="220" fill="none" stroke="#33e8b0" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Ω glyph -->
  <text x="600" y="380" text-anchor="middle" font-family="'Hanken Grotesk','Inter',system-ui,sans-serif" font-size="220" font-weight="800" fill="url(#emerald)">Ω</text>

  <!-- top eyebrow -->
  <g transform="translate(600 130)">
    <rect x="-90" y="-18" width="180" height="36" rx="18" fill="#0e1a1f" stroke="#33e8b0" stroke-opacity="0.4"/>
    <circle cx="-66" cy="0" r="4" fill="#33e8b0"/>
    <text x="-50" y="5" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#a0d4c0" letter-spacing="2.5">OMEGA OS · V3 — ONLINE</text>
  </g>

  <!-- title -->
  <text x="600" y="500" text-anchor="middle" font-family="'Hanken Grotesk','Inter',system-ui,sans-serif" font-size="58" font-weight="700" fill="#f4f6f8" letter-spacing="-1">THE OMEGA AI Operating System</text>

  <!-- subtitle -->
  <text x="600" y="556" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="22" fill="#8a96a8">A cinematic AI operating system. Living, deep, intelligent.</text>

  <!-- bottom url bar -->
  <text x="600" y="600" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="13" fill="#5a6878" letter-spacing="3">omega-nine-weld.vercel.app</text>
</svg>
