<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OMEGA — Cloud AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>Ω</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ═══ PASSWORD GATE ═══ -->
  <div id="password-gate">
    <div class="gate-card">
      <div class="gate-logo">Ω</div>
      <h1 class="gate-title">OMEGA</h1>
      <p class="gate-subtitle">Cloud AI · Secure Access</p>
      <div class="gate-input-wrap">
        <input type="password" id="password-input" placeholder="Enter access key" autocomplete="off" spellcheck="false">
        <button id="password-submit" class="gate-btn">→</button>
      </div>
      <p id="password-error" class="gate-error"></p>
    </div>
  </div>

  <!-- ═══ MAIN CHAT UI ═══ -->
  <div id="chat-ui" class="hidden">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <span class="header-logo">Ω</span>
        <span class="header-title">OMEGA</span>
        <span class="header-badge" id="model-badge">deepseek-v4-flash-free</span>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">🌓</button>
        <button id="settings-toggle" class="icon-btn" title="Settings">⚙️</button>
        <button id="new-chat-btn" class="icon-btn" title="New chat">＋</button>
      </div>
    </header>

    <!-- Settings Panel -->
    <div id="settings-panel" class="hidden">
      <div class="settings-row">
        <label>API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-... (optional)" autocomplete="off">
      </div>
      <div class="settings-row">
        <label>Model</label>
        <select id="model-select">
          <option value="deepseek-v4-flash-free">deepseek-v4-flash-free</option>
          <option value="mimo-v2.5-free">mimo-v2.5-free</option>
          <option value="deepseek-v4-free">deepseek-v4-free</option>
          <option value="qwq-32b-free">qwq-32b-free</option>
          <option value="north-mini-code-free">north-mini-code-free</option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="claude-sonnet-4">claude-sonnet-4</option>
        </select>
      </div>
      <div class="settings-row">
        <label>API Base URL</label>
        <input type="text" id="api-url-input" value="https://api.opencode.ai/v1" placeholder="https://api.opencode.ai/v1">
      </div>
      <div class="settings-row settings-actions">
        <button id="settings-close" class="btn-secondary">Done</button>
        <button id="clear-conversations-btn" class="btn-danger">Clear all conversations</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages-container">
      <div id="messages">
        <div class="welcome-message">
          <div class="welcome-icon">Ω</div>
          <h2>OMEGA Cloud Ready</h2>
          <p>Connected to OpenCode AI. Ask me anything — I'm always online.</p>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <div id="input-wrap">
        <textarea id="message-input" rows="1" placeholder="Message OMEGA..." autocomplete="off"></textarea>
        <button id="send-btn" disabled>➤</button>
      </div>
      <p id="input-footer">OMEGA uses OpenCode AI · Responses are streamed in real-time</p>
    </div>
  </div>

  <!-- ═══ CDN Libraries ═══ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
