<style>
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:24px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased}
.chat-scroll::-webkit-scrollbar{width:6px}
.chat-scroll::-webkit-scrollbar-track{background:transparent}
.chat-scroll::-webkit-scrollbar-thumb{background-color:#D1D5DB;border-radius:10px}
@keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-6px);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

.dark .bg-animated-gradient{background:linear-gradient(-45deg,#191c1d,#2e3132,#1a2333,#191c1d);background-size:400% 400%;animation:gradientBG 15s ease infinite}

.delay-100{animation-delay:100ms}.delay-200{animation-delay:200ms}.delay-300{animation-delay:300ms}

.typing-dot{animation:typingBounce 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
.spinner{animation:spin 1s linear infinite}
.search-active .search-indicator{animation:pulseRing 2s infinite}
.copy-btn{opacity:0;transition:opacity 0.2s}
.code-block:hover .copy-btn{opacity:1}
</style>

</head>
<body class="bg-animated-gradient text-on-surface font-body-md text-body-md h-screen overflow-hidden flex flex-col antialiased selection:bg-ai-accent selection:text-white">

<div class="flex flex-1 overflow-hidden relative">
  <!-- Sidebar -->

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let STATE = {
  sessions: {},         // { id: { id, title, model, created, updated, messages } }
  sessionOrder: [],     // ordered session IDs
  activeSession: null,  // current session ID
  currentMessages: [],
  conversationHistory: [],
  currentModel: 'deepseek-v4-flash-free',
  allModels: [],
  isStreaming: false,
  searchEnabled: false,
};

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
async function init() {
  // Load from localStorage
  loadState();
  // Fetch models
  await fetchModels();
  // Render sidebar history
  renderHistory();
  // If no active session, create one
  if (!STATE.activeSession || !STATE.sessions[STATE.activeSession]) {
    newChat();
  } else {
    loadSession(STATE.activeSession);
  }
  // Theme
  applyTheme();
  // UI events
  setupInputEvents();
}

// ═══════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════
function saveState() {
  try {
    localStorage.setItem('omega_state', JSON.stringify({
      sessions: STATE.sessions,
      sessionOrder: STATE.sessionOrder,
      activeSession: STATE.activeSession,
      currentModel: STATE.currentModel,
    }));
  } catch(e) {
    // localStorage might be full
  }
}

function loadState() {
  try {
    const saved = localStorage.getItem('omega_state');
    if (saved) {
      const data = JSON.parse(saved);
      STATE.sessions = data.sessions || {};
      STATE.sessionOrder = data.sessionOrder || [];
      STATE.activeSession = data.activeSession || null;
      STATE.currentModel = data.currentModel || 'deepseek-v4-flash-free';
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
//  MODELS
// ═══════════════════════════════════════════
async function fetchModels() {
  try {
    const res = await fetch('/api/models');
    if (res.ok) {
      const data = await res.json();
      STATE.allModels = data.data || [];
    }
  } catch(e) {
    // Fallback to hardcoded
    STATE.allModels = [
      { id: 'deepseek-v4-flash-free', free: true },
      { id: 'mimo-v2.5-free', free: true },
      { id: 'hy3-free', free: true },
      { id: 'nemotron-3-ultra-free', free: true },
      { id: 'north-mini-code-free', free: true },
      { id: 'claude-fable-5', free: false },
      { id: 'claude-sonnet-4', free: false },
      { id: 'claude-haiku-4-5', free: false },
      { id: 'gemini-3.5-flash', free: false },
      { id: 'gpt-5.4-mini', free: false },
      { id: 'deepseek-v4-flash', free: false },
      { id: 'grok-4.5', free: false },
    ];
  }
  renderModelSelect();
}

function renderModelSelect() {
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = '';
  // Separate free and other models
  const free = STATE.allModels.filter(m => m.free);
  const paid = STATE.allModels.filter(m => !m.free);
  const opts = [];
  if (free.length) {
    opts.push({ label: '— Free Models —', value: '', disabled: true });
    for (const m of free) opts.push({ label: m.id, value: m.id });
  }
  if (paid.length) {
    opts.push({ label: '— Other Models —', value: '', disabled: true });
    for (const m of paid) opts.push({ label: m.id, value: m.id });
  }
  for (const o of opts) {
    const opt = document.createElement('option');
    opt.value = o.value;
    opt.textContent = o.label;
    if (o.disabled) opt.disabled = true;
    if (o.value === STATE.currentModel) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('modelLabel').textContent = STATE.currentModel;
}

function changeModel(model) {
  if (!model) return;
  STATE.currentModel = model;
  document.getElementById('modelLabel').textContent = model;
  // Update in current session
  if (STATE.sessions[STATE.activeSession]) {
    STATE.sessions[STATE.activeSession].model = model;
    saveState();
  }
}

// ═══════════════════════════════════════════
//  SESSION MANAGEMENT
// ═══════════════════════════════════════════
function newChat() {
  const id = 'session-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  const session = {
    id,
    title: null,  // auto-generated after first exchange
    model: STATE.currentModel,
    created: new Date().toISOString(),
    updated: new Date().toISOString(),
    messages: [],
  };
  STATE.sessions[id] = session;
  STATE.sessionOrder.unshift(id);
  STATE.activeSession = id;
  STATE.currentMessages = [];
  STATE.conversationHistory = [];
  saveState();
  renderHistory();
  showWelcome();
  scrollToBottom();
  document.getElementById('promptInput').focus();
}

function showWelcome() {
  const container = document.getElementById('messagesContainer');
  container.innerHTML = `
    <div class="flex flex-col items-center justify-center py-16 fade-in-up">
      <div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center mb-4 shadow-md">
        <span class="text-on-primary text-3xl font-bold">&Omega;</span>
      </div>
      <h2 class="text-headline-lg font-headline-lg text-primary dark:text-inverse-primary text-center mb-2">Omega Cloud</h2>
      <p class="text-on-surface-variant text-center max-w-md">Enterprise AI assistant. Ask me anything.</p>
      <div class="flex flex-wrap gap-2 mt-6 justify-center" id="suggestionChips"></div>
    </div>`;
  const chips = ['Write a Python script to parse CSV','Explain quantum computing','Debug my React component','Design a REST API'];
  const cc = document.getElementById('suggestionChips');
  for (const s of chips) {
    const btn = document.createElement('button');
    btn.className = 'px-4 py-2 border border-surface-border/50 rounded-lg text-label-sm font-label-sm text-on-surface-variant hover:bg-surface-container/50 hover:text-primary transition-all duration-200 hover:-translate-y-0.5 glass-panel';
    btn.textContent = s;
    btn.onclick = () => { document.getElementById('promptInput').value = s; document.getElementById('promptInput').dispatchEvent(new Event('input')); sendMessage(); };
    cc.appendChild(btn);
  }
}

function loadSession(id) {
  const session = STATE.sessions[id];
  if (!session) return;
  STATE.activeSession = id;
  STATE.currentModel = session.model || STATE.currentModel;
  STATE.currentMessages = session.messages || [];
  STATE.conversationHistory = [...STATE.currentMessages];
  document.getElementById('modelSelect').value = STATE.currentModel;
  document.getElementById('modelLabel').textContent = STATE.currentModel;
  renderMessages();
  renderHistory();
  scrollToBottom();
}

function deleteSession(id) {
  if (!confirm('Delete this conversation?')) return;
  delete STATE.sessions[id];
  STATE.sessionOrder = STATE.sessionOrder.filter(s => s !== id);
  if (STATE.activeSession === id) {
    if (STATE.sessionOrder.length) {
      loadSession(STATE.sessionOrder[0]);
    } else {
      newChat();
    }
  }
  saveState();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!STATE.sessionOrder.length) {
    list.innerHTML = '<div class="text-on-surface-variant text-center text-sm py-8">No conversations</div>';
    return;
  }
  list.innerHTML = '';
  for (const id of STATE.sessionOrder) {
    const s = STATE.sessions[id];
    if (!s) continue;
    const div = document.createElement('div');
    const isActive = id === STATE.activeSession;
    const title = s.title || 'New Chat';
    const date = new Date(s.updated);
    const dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    div.className = 'group flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer transition-all duration-200 ' +
      (isActive ? 'bg-surface-container-low/80 border-l-2 border-ai-accent' : 'hover:bg-surface-container/50 border-l-2 border-transparent');
    div.innerHTML = `
      <div class="flex-1 min-w-0" onclick="loadSession('${id}')">
        <div class="text-sm font-medium truncate ${isActive ? 'text-primary' : 'text-on-surface'}">${escapeHtml(title)}</div>
        <div class="text-xs text-text-muted mt-0.5">${dateStr}</div>
      </div>
      <button onclick="event.stopPropagation();deleteSession('${id}')" class="opacity-0 group-hover:opacity-100 text-text-muted hover:text-error transition-all duration-200 p-1 rounded hover:bg-surface-container">
        <span class="material-symbols-outlined" style="font-size:14px;">delete</span>
      </button>
    `;
    list.appendChild(div);
  }
}

async function autoTitle() {
  const session = STATE.sessions[STATE.activeSession];
  if (!session || session.title) return;
  const msgs = session.messages || [];
  if (msgs.length < 2) return;
  const firstUser = msgs.find(m => m.role === 'user');
  const firstAI = msgs.find(m => m.role === 'assistant');
  if (!firstUser || !firstAI) return;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Generate a concise 3-6 word title for this conversation. Return ONLY the title, nothing else.\n\nUser: ' + firstUser.content.slice(0,200) + '\nAssistant: ' + firstAI.content.slice(0,200),
        model: STATE.currentModel,
      }),
    });
    if (res.ok) {
      const contentType = res.headers.get('Content-Type') || '';
      let text = '';
      if (contentType.includes('text/event-stream')) {
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const d = line.slice(6).trim();
            if (d === '[DONE]') continue;
            try {
              const p = JSON.parse(d);
              const c = p?.choices?.[0]?.delta?.content || '';
              if (c) text += c;
            } catch(e) {}
          }
        }
      } else {
        const data = await res.json();
        text = data?.choices?.[0]?.message?.content || data?.content || '';
      }
      text = text.replace(/[""*]/g, '').trim();
      if (text && text.length < 60) {
        session.title = text;
        saveState();
        renderHistory();
      }
    }
  } catch(e) {
    // Silent fail for auto-title
  }
}

// ═══════════════════════════════════════════
//  MESSAGE RENDERING
// ═══════════════════════════════════════════
function renderMessages() {
  const container = document.getElementById('messagesContainer');
  if (!STATE.currentMessages.length) {
    showWelcome();
    return;
  }
  container.innerHTML = '';
  for (let i = 0; i < STATE.currentMessages.length; i++) {
    const msg = STATE.currentMessages[i];
    appendMessageToDOM(msg.role, msg.content, 'restored-' + i, false);
  }
  scrollToBottom();
}

function appendMessageToDOM(role, content, msgId, animate = true) {
  const container = document.getElementById('messagesContainer');
  // Remove welcome if present
  const welcome = container.querySelector('.flex.flex-col.items-center');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.id = msgId;
  div.className = 'flex ' + (role === 'user' ? 'justify-end' : 'justify-start group gap-4') + (animate ? ' fade-in-up' : '');
  div.setAttribute('data-role', role);

  let inner = '';
  if (role === 'user') {
    inner = `<div class="max-w-[85%] md:max-w-[75%]">
      <div class="glass-panel text-on-surface px-5 py-3.5 rounded-2xl rounded-tr-sm inline-block transition-transform duration-300 hover:-translate-y-0.5 hover:shadow-md relative">
        <p class="font-body-md text-body-md leading-relaxed whitespace-pre-wrap">${escapeHtml(content)}</p>
      </div>
    </div>`;
  } else {
    inner = `<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center shrink-0 mt-1 shadow-sm border border-surface-border/30">
      <span class="material-symbols-outlined text-on-primary" style="font-variation-settings:'FILL' 1;font-size:16px;">bolt</span>
    </div>
    <div class="max-w-[90%] md:max-w-[85%]">
      <div class="prose prose-slate max-w-none text-on-surface font-body-md text-body-md leading-relaxed">
        <div class="ai-content">${content ? renderMarkdown(content) : '<div class="flex gap-1.5 py-2"><span class="typing-dot w-2 h-2 bg-on-surface-variant rounded-full inline-block"></span><span class="typing-dot w-2 h-2 bg-on-surface-variant rounded-full inline-block"></span><span class="typing-dot w-2 h-2 bg-on-surface-variant rounded-full inline-block"></span></div>'}</div>
      </div>
    </div>`;
  }

  div.innerHTML = inner;
  container.appendChild(div);
  if (animate) scrollToBottom();
  return div;
}

function updateAssistantMessage(msgId, content) {
  const el = document.getElementById(msgId);
  if (!el) return;
  const contentDiv = el.querySelector('.ai-content');
  if (contentDiv) {
    contentDiv.innerHTML = renderMarkdown(content);
    // Attach copy buttons to code blocks
    contentDiv.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.copy-btn')) return;
      const cb = document.createElement('button');
      cb.className = 'copy-btn absolute top-2 right-2 px-2 py-1 text-xs rounded bg-surface-container-low border border-surface-border text-text-muted hover:text-primary hover:bg-surface-container transition-all duration-200';
      cb.textContent = 'Copy';
      cb.onclick = () => {
        const code = pre.querySelector('code');
        if (code) navigator.clipboard.writeText(code.textContent).then(() => { cb.textContent = 'Copied!'; setTimeout(() => cb.textContent='Copy', 1500); });
      };
      pre.style.position = 'relative';
      pre.classList.add('code-block');
      pre.appendChild(cb);
    });
  }
  scrollToBottom();
}

function renderMarkdown(text) {
  if (!text) return '';
  let html;
  try {
    html = marked.parse(text);
  } catch(e) {
    html = escapeHtml(text);
  }
  // Wrap in temp div to highlight code
  const temp = document.createElement('div');
  temp.innerHTML = html;
  temp.querySelectorAll('pre code').forEach(b => {
    try { hljs.highlightElement(b); } catch(e) {}
  });
  return temp.innerHTML;
}

function scrollToBottom() {
  const chatArea = document.getElementById('chatArea');
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 30);
}

// ═══════════════════════════════════════════
//  WEB SEARCH
// ═══════════════════════════════════════════
function toggleSearch() {
  STATE.searchEnabled = !STATE.searchEnabled;
  const btn = document.getElementById('searchToggle');
  const label = document.getElementById('searchLabel');
  if (STATE.searchEnabled) {
    btn.classList.add('bg-ai-accent/10', 'text-ai-accent', 'border', 'border-ai-accent/30');
    label.textContent = 'Search On';
  } else {
    btn.classList.remove('bg-ai-accent/10', 'text-ai-accent', 'border', 'border-ai-accent/30');
    label.textContent = 'Search';
  }
}

async function webSearch(query) {
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.results || [];
  } catch(e) {
    return null;
  }
}

// ═══════════════════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════════════════
async function sendMessage() {
  if (STATE.isStreaming) return;
  const textarea = document.getElementById('promptInput');
  const text = textarea.value.trim();
  if (!text) return;

  // Clear input
  textarea.value = '';
  textarea.style.height = 'auto';
  toggleSubmitBtn(false);

  // Build message history
  const userMsg = { role: 'user', content: text };
  STATE.currentMessages.push(userMsg);
  STATE.conversationHistory.push(userMsg);
  const userMsgId = 'msg-' + Date.now() + '-user';
  appendMessageToDOM('user', text, userMsgId);

  // Add AI placeholder
  const aiMsgId = 'msg-' + Date.now() + '-ai';
  appendMessageToDOM('assistant', '', aiMsgId);
  STATE.isStreaming = true;

  let searchContext = '';
  // Web search if enabled
  if (STATE.searchEnabled) {
    try {
      const results = await webSearch(text);
      if (results && results.length > 0) {
        searchContext = '\n\nWeb Search Results:\n' + results.map((r, i) =>
          `[${i+1}] ${r.title}\n${r.snippet}\nSource: ${r.url}`
        ).join('\n\n');
      }
    } catch(e) {}
  }

  try {
    let messages = STATE.conversationHistory;
    if (searchContext) {
      // Add search context as a system note before the last user message
      messages = [
        { role: 'system', content: 'Web search results for context:\n' + searchContext + '\n\nUse this information if relevant to answer the user.' },
        ...STATE.conversationHistory.slice(0, -1),
        { role: 'user', content: text + '\n\n(Note: Web search was queried. Results above may provide context.)' },
      ];
    }

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        model: STATE.currentModel,
        conversationHistory: STATE.conversationHistory.slice(0, -1),
      }),
    });

    if (!res.ok) {
      const errText = await res.text();
      let msg = 'HTTP ' + res.status;
      try { const d = JSON.parse(errText); msg = d.error || msg; } catch(e) { msg = errText.slice(0,150) || msg; }
      throw new Error(msg);
    }

    const contentType = res.headers.get('Content-Type') || '';
    let fullResponse = '';

    if (contentType.includes('text/event-stream')) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const c = parsed?.choices?.[0]?.delta?.content || '';
            if (c) {
              fullResponse += c;
              updateAssistantMessage(aiMsgId, fullResponse);
            }
          } catch(e) {}
        }
      }
    } else {
      const data = await res.json();
      fullResponse = data?.choices?.[0]?.message?.content || data?.content || 'No response';
      updateAssistantMessage(aiMsgId, fullResponse);
    }

    if (fullResponse) {
      const aiMsg = { role: 'assistant', content: fullResponse };
      STATE.currentMessages.push(aiMsg);
      STATE.conversationHistory.push(aiMsg);
      // Save to session store
      const session = STATE.sessions[STATE.activeSession];
      if (session) {
        session.messages = STATE.currentMessages;
        session.updated = new Date().toISOString();
        saveState();
        // Auto-title after first exchange
        if (!session.title && STATE.currentMessages.length >= 2) {
          autoTitle();
        }
      }
    }
  } catch(err) {
    updateAssistantMessage(aiMsgId, '**⚠️ Error:** ' + escapeHtml(err.message));
  } finally {
    STATE.isStreaming = false;
  }
}

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
function setupInputEvents() {
  const textarea = document.getElementById('promptInput');
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
    toggleSubmitBtn(!!this.value.trim());
  });
  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

function toggleSubmitBtn(active) {
  const btn = document.getElementById('submitBtn');
  btn.disabled = !active;
  if (active) {
    btn.classList.remove('bg-surface-container/50','text-text-muted','cursor-not-allowed');
    btn.classList.add('bg-primary','text-on-primary','cursor-pointer','hover:-translate-y-0.5','hover:shadow-md');
  } else {
    btn.classList.add('bg-surface-container/50','text-text-muted','cursor-not-allowed');
    btn.classList.remove('bg-primary','text-on-primary','cursor-pointer','hover:-translate-y-0.5','hover:shadow-md');
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark');
  localStorage.setItem('omega_theme', isDark ? 'dark' : 'light');
  document.getElementById('themeIcon').textContent = isDark ? 'light_mode' : 'dark_mode';
  document.getElementById('themeLabel').textContent = isDark ? 'Light' : 'Dark';
}

function applyTheme() {
  const saved = localStorage.getItem('omega_theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.classList.add('dark');
    document.getElementById('themeIcon').textContent = 'light_mode';
    document.getElementById('themeLabel').textContent = 'Light';
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
init();
</script>
