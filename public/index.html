<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ω M E G A</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>Ω</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ CHAT UI ═══ -->
  <div id="chat-ui">

    <!-- Header -->
    <header id="header">
      <div class="header-inner">
        <div class="header-logo">
          <span class="logo-omega">Ω</span>
          <span class="logo-text">M E G A</span>
        </div>
        <div class="header-nav">
          <span class="nav-badge" id="model-badge">[  deepseek-v4-flash-free  ]</span>
          <button id="new-chat-btn" class="btn-bracket" title="New conversation">[  + N E W  ]</button>
          <button id="settings-toggle" class="btn-bracket" title="Settings">[  ⚙  ]</button>
          <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌓</button>
        </div>
      </div>
    </header>

    <!-- Settings -->
    <div id="settings-panel" class="hidden">
      <div class="settings-card">
        <h3 class="settings-title">[  C O N F I G  ]</h3>
        <div class="settings-row">
          <label>API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-... (optional)">
        </div>
        <div class="settings-row">
          <label>Model</label>
          <select id="model-select">
            <option value="deepseek-v4-flash-free">deepseek-v4-flash-free</option>
            <option value="mimo-v2.5-free">mimo-v2.5-free</option>
            <option value="deepseek-v4-free">deepseek-v4-free</option>
            <option value="qwq-32b-free">qwq-32b-free</option>
            <option value="north-mini-code-free">north-mini-code-free</option>
            <option value="gpt-4o">gpt-4o</option>
            <option value="claude-sonnet-4">claude-sonnet-4</option>
          </select>
        </div>
        <div class="settings-row">
          <label>API URL</label>
          <input type="text" id="api-url-input" value="https://api.opencode.ai/v1">
        </div>
        <div class="settings-actions">
          <button id="settings-close" class="btn-bracket">[  D O N E  ]</button>
          <button id="clear-conversations-btn" class="btn-bracket danger">[  C L E A R  ]</button>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages-container">
      <div id="messages">
        <div class="welcome-message">
          <div class="welcome-icon">Ω</div>
          <h2 class="welcome-title">[  C O N N E C T E D  ]</h2>
          <p class="welcome-sub">Streaming live from OpenCode AI.<br>Ask me anything — I'm always online.</p>
          <div class="welcome-hint">[  press Enter to send · Shift+Enter for new line  ]</div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <div class="input-inner">
        <div id="input-wrap">
          <textarea id="message-input" rows="1" placeholder="[  M E S S A G E  Ω  ...  ]" autocomplete="off"></textarea>
          <button id="send-btn" disabled>→</button>
        </div>
      </div>
      <div class="input-footer">
        <span class="footer-dot">●</span> OMEGA Cloud · OpenCode AI
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
